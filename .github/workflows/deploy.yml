name: Deploy imoifa-site

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euxo pipefail
            echo "=== Who/where ==="
            whoami
            hostname
            pwd

            echo "=== Go to deploy path ==="
            cd ${{ secrets.DEPLOY_PATH }}
            pwd
            ls -la

            echo "=== Git status ==="
            git remote -v
            git status || true

            echo "=== Sync to origin/main (deterministic) ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Docker versions ==="
            docker --version
            docker compose version || true
            docker-compose --version || true

            echo "=== Deploy ==="
            docker compose up -d --build

            echo "=== Health check ==="
            curl -fsS -I http://127.0.0.1:8081/en/glossary/ | head -n 10
